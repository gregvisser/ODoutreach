# Install, lint, validate schema, and build. Uses placeholder Entra env for compile-only CI — not real auth.
# Build runs `next build --webpack` (see package.json) for a consistent production bundle on all platforms.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      AUTH_SECRET: "ci-build-secret-placeholder-min-32-chars-ok"
      AUTH_MICROSOFT_ENTRA_ID_ID: "11111111-1111-1111-1111-111111111111"
      AUTH_MICROSOFT_ENTRA_ID_SECRET: "ci-placeholder-client-secret-not-for-production-use"
      AUTH_MICROSOFT_ENTRA_ID_ISSUER: "https://login.microsoftonline.com/22222222-2222-2222-2222-222222222222/v2.0/"
      # Prisma is imported during `next build` page-data collection — URL is compile-only (no DB required on runners).
      DATABASE_URL: "postgresql://ci:ci@127.0.0.1:5432/ci_build?schema=public"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      - name: Prisma validate
        run: npx prisma validate

      - name: ESLint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build
