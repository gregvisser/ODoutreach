<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 64" role="img" aria-label="OpensDoors">
  <title>OpensDoors</title>
  <!--
    Placeholder OpensDoors horizontal wordmark. Uses the same monogram
    tile as /branding/opensdoors-mark.svg followed by an "OpensDoors"
    wordmark and a muted "Outreach" tag. Replace this SVG (or add
    /public/branding/opensdoors-logo.png alongside it) to swap in the
    final brand artwork without changing any component markup.
  -->
  <defs>
    <linearGradient id="od-bg-h" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
  </defs>
  <!-- Monogram tile -->
  <rect x="2" y="6" width="52" height="52" rx="12" ry="12" fill="url(#od-bg-h)"/>
  <path
    d="M35 18 L24 32 L35 46"
    fill="none"
    stroke="#f9fafb"
    stroke-width="2"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.55"
  />
  <g fill="#f9fafb" font-family="'Geist','Inter','Helvetica Neue',Arial,sans-serif" font-weight="700">
    <text x="12" y="42" font-size="22" letter-spacing="-1">O</text>
    <text x="29" y="42" font-size="22" letter-spacing="-1">D</text>
  </g>
  <!-- Wordmark -->
  <g font-family="'Geist','Inter','Helvetica Neue',Arial,sans-serif">
    <text
      x="70"
      y="36"
      font-size="22"
      font-weight="600"
      letter-spacing="-0.4"
      fill="currentColor"
    >OpensDoors</text>
    <text
      x="70"
      y="52"
      font-size="11"
      font-weight="500"
      letter-spacing="2.2"
      fill="currentColor"
      opacity="0.55"
    >OUTREACH</text>
  </g>
</svg>
